Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E\");\n  background-repeat: repeat;\n  background-size: 220px 220px;\n  opacity: 0.07;\n  pointer-events: none;\n  animation: grain 8s steps(10) infinite;\n  mix-blend-mode: multiply;\n  z-index: 30;\n}\n\n.tv-static-noise {\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E\");\n  background-size: 100% 100%;\n  animation: tvStatic 0.08s steps(1) infinite;\n}\n\n.tv-scan-in {\n  animation: scanIn 0.55s ease-out forwards;\n}\n\n.tv-flicker {\n  animation: tvFlicker 0.45s ease-out forwards;\n}\n\n.crt-scanlines {\n  background-image: repeating-linear-gradient(\n    0deg,\n    transparent,\n    transparent 2px,\n    rgba(0, 0, 0, 0.1) 2px,\n    rgba(0, 0, 0, 0.1) 4px\n  );\n}\n\n.letterbox {\n  position: relative;\n}\n.letterbox::before,\n.letterbox::after {\n  content: '';\n  position: absolute;\n  left: 0;\n  right: 0;\n  height: 11%;\n  background: #000;\n  z-index: 20;\n  pointer-events: none;\n}\n.letterbox::before { top: 0; }\n.letterbox::after  { bottom: 0; }\n\n.reveal-up {\n  opacity: 0;\n  transform: translateY(28px);\n  transition: opacity 0.9s ease, transform 0.9s ease;\n}\n.reveal-up.visible {\n  opacity: 1;\n  transform: translateY(0);\n}\n"},
  {"path": "app/layout.tsx", "content": "import type { Metadata } from 'next'\nimport { Playfair_Display, Cormorant_Garamond, IBM_Plex_Mono } from 'next/font/google'\nimport './globals.css'\n\nconst playfair = Playfair_Display({\n  subsets: ['latin'],\n  variable: '--font-playfair',\n  display: 'swap',\n})\n\nconst cormorant = Cormorant_Garamond({\n  subsets: ['latin'],\n  weight: ['300', '400', '500', '600'],\n  style: ['normal', 'italic'],\n  variable: '--font-cormorant',\n  display: 'swap',\n})\n\nconst ibmMono = IBM_Plex_Mono({\n  subsets: ['latin'],\n  weight: ['300', '400'],\n  variable: '--font-mono',\n  display: 'swap',\n})\n\nexport const metadata: Metadata = {\n  title: 'Linger & Bloom | Florals · Events · Editorial',\n  description:\n    'Immersive floral design, cinematic tablescapes, and editorial still life by Linger & Bloom.',\n  openGraph: {\n    title: 'Linger & Bloom',\n    description: 'Florals · Events · Editorial',\n    type: 'website',\n  },\n}\n\nexport default function RootLayout({ children }: { children: React.ReactNode }) {\n  return (\n    <html\n      lang=\"en\"\n      className={`${playfair.variable} ${cormorant.variable} ${ibmMono.variable}`}\n    >\n      <body className=\"bg-cinema text-cream antialiased\">{children}</body>\n    </html>\n  )\n}\n"},
