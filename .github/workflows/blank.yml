message: feat: build immersive portfolio site for Linger & Bloom

Three-pillar portfolio with distinct visual languages:
- Florals & Tablescapes: interactive vintage CRT TV screens for the
  Supper & Cinema Series (Before Sunrise, North By Northwest, Big Night,
  Moulin Rouge) + film-still letterbox gallery for Weddings
- Private Events: magazine-style spreads with lookbook detail grid and
  animated testimonial carousel for Regency Study & Night of Betrayal
- Editorial & Still Life: clean editorial grid on parchment background

Stack: Next.js 14, TypeScript, Tailwind CSS, Framer Motion
Placeholder gradient divs ready to swap for real photos.
